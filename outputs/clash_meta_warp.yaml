    server: cloudflare.182682.xyz
    port: 2087
    uuid: 2281ea89-805f-45fa-8902-6e4ad0e26666
    udp: false
    tls: true
    network: ws
    servername: ws.freews.eu.org
    ws-opts:
      path: /?ed=2560
      headers:
        Host: ws.freews.eu.org
    remote-dns-resolve: true
    dns:
      - 1.1.1.1
      - 8.8.8.8
    dialer-proxy: ☁ WARP前置节点
